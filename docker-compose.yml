services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5435:5432"
    volumes:
      - pgdata_payments:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env    
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
    ports:
      - "${API_PORT:-8000}:8000"
    restart: on-failure
    depends_on:
      - db

volumes:
  pgdata_payments: {}
